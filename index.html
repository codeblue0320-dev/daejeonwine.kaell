<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>자양동 오늘의 와인</title>
<meta name="description" content="대전 동구 자양동 날씨에 맞춰 매일 1~3만원대 와인을 추천하는 웹앱">
<style>
:root{color-scheme:light;
 --bg:#faf6f2; --card:#ffffff; --ink:#2b1d1f; --muted:#8a7770;
 --wine:#7b1f2b; --wine2:#a83246; --gold:#b8863b; --line:#ece2db;
 --red-wine:#8c2230;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
 line-height:1.55;padding:18px 16px 60px;max-width:720px;margin:0 auto}
h1{font-size:22px;margin:0 0 2px;letter-spacing:-.3px}
.sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.weather{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#fff,#fbf1ee);
 border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:16px;min-height:64px}
.weather .emo{font-size:34px;line-height:1}
.weather .wx-main{font-size:15px;font-weight:600}
.weather .wx-sub{font-size:12px;color:var(--muted)}
.weather .refresh{margin-left:auto;background:transparent;border:1px solid var(--line);
 border-radius:8px;padding:6px 10px;font-size:12px;color:var(--muted);cursor:pointer}
.sectlabel{font-size:12px;font-weight:700;color:var(--wine);letter-spacing:.5px;
 text-transform:uppercase;margin:22px 0 8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;
 padding:20px;box-shadow:0 6px 22px rgba(123,31,43,.06)}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-red{background:#fbe9ec;color:var(--red-wine)}
.b-white{background:#fbf4d8;color:#8a6d15}
.b-tier{background:#eef0ef;color:#4a5450}
.wname{font-size:19px;font-weight:700;margin:2px 0 3px;line-height:1.3}
.wvar{font-size:13px;color:var(--wine2);font-weight:600;margin-bottom:8px}
.wregion{font-size:12.5px;color:var(--muted);margin-bottom:12px}
.reason{background:#f7efe9;border-left:3px solid var(--gold);border-radius:8px;
 padding:11px 13px;font-size:13.5px;margin:12px 0}
.meta{font-size:13px;margin:10px 0 2px}
.meta b{color:var(--wine)}
.pair{font-size:13px;margin-top:4px}
.bars{margin-top:12px}
.bar{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px}
.bar .lb{width:38px;color:var(--muted)}
.bar .track{flex:1;height:7px;background:#eee5df;border-radius:6px;overflow:hidden}
.bar .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--wine2),var(--wine))}
.bar .vv{width:30px;text-align:right;color:var(--muted)}
.lab{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-top:8px}
.ctl{margin:12px 0}
.ctl label{font-size:13px;font-weight:600;display:flex;justify-content:space-between}
.ctl input[type=range]{width:100%;accent-color:var(--wine);margin-top:6px}
.previewline{font-size:13px;color:var(--muted);margin-top:6px}
.previewpick{font-size:14.5px;font-weight:600;margin-top:8px}
.hist{margin-top:8px}
.hrow{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;
 padding:8px 4px;border-bottom:1px solid var(--line)}
.hrow .hd{color:var(--muted);white-space:nowrap}
.hrow .hn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{background:var(--wine);color:#fff;border:none;border-radius:10px;
 padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.manual{display:none;background:#fff4ec;border:1px solid #f0d9c8;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px}
.manual.show{display:block}
.foot{font-size:11.5px;color:var(--muted);margin-top:26px;line-height:1.6}
select{font-size:13px;padding:6px 8px;border-radius:8px;border:1px solid var(--line);background:#fff}
.spin{opacity:.5}
</style>
</head>
<body>
<h1>🍷 자양동 오늘의 와인</h1>
<div class="sub">대전 동구 자양동 · 날씨에 맞춰 매일 다른 1~3만원대 와인을 추천 (한 달 내 중복 없음)</div>

<div class="weather" id="weather"><div class="emo">⏳</div><div><div class="wx-main">자양동 날씨를 불러오는 중…</div></div></div>

<div class="manual" id="manual">
  실시간 날씨를 불러오지 못했어요. 오늘 날씨를 직접 입력해 추천받을 수 있어요.
  <div class="row">
    <label>최고기온 <input type="number" id="mTemp" value="28" style="width:60px"> °C</label>
    <label>강수 <input type="number" id="mRain" value="0" style="width:60px"> mm</label>
    <button class="btn" id="mGo">추천받기</button>
  </div>
</div>

<div class="sectlabel">오늘의 추천</div>
<div class="card" id="todayCard"><div class="previewline">날씨 확인 후 추천이 표시됩니다.</div></div>

<div class="sectlabel">🌦️ 날씨 실험실 <span style="font-weight:400;text-transform:none;color:var(--muted)">— 조건을 바꿔 추천을 미리 보기</span></div>
<div class="lab">
  <div class="ctl">
    <label><span>기온 (그날 최고)</span><span id="tOut">28°C</span></label>
    <input type="range" id="tSlider" min="-5" max="38" value="28">
  </div>
  <div class="ctl">
    <label><span>강수량 (하루)</span><span id="rOut">10mm</span></label>
    <input type="range" id="rSlider" min="0" max="40" value="10">
  </div>
  <div class="row">
    <select id="colorFilter">
      <option value="all">레드·화이트 모두</option>
      <option value="red">레드만</option>
      <option value="white">화이트만</option>
    </select>
    <span class="previewline" id="labTarget"></span>
  </div>
  <div class="previewpick" id="labPick"></div>
</div>

<div class="sectlabel">📖 최근 추천 기록</div>
<div class="hist" id="hist"></div>
<div class="row"><button class="btn ghost" id="resetBtn">기록 초기화</button></div>

<div class="foot" id="foot"></div>

<script src="wines.js"></script>
<script src="app.js"></script>
</body>
</html>
