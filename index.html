// ---------- algorithm ----------
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
const CITRUS=['시트러스','감귤','레몬','라임','자몽'];
const FRESH=['시트러스','감귤','레몬','라임','자몽','청사과','사과','풋','민트','허브','라즈베리','베리','체리','살구','복숭아','자두','열대','꽃','배'];
function targetProfile(t,r){
  const tAcid=clamp(48+(t-15)*1.6,30,88);
  const rainBody=clamp(r,0,25)*1.4;
  const tBody=clamp(68-(t-15)*1.3+rainBody,30,90);
  return {tAcid,tBody};
}
function scoreWine(w,tp,t,r){
  if(!w.ok) return -1e9;
  let s=0;
  s-=Math.abs(w.ac-tp.tAcid)*1.0;
  s-=Math.abs(w.bd-tp.tBody)*1.1;
  const f=w.fl||'';
  const hot=t>=25,warm=t>=20,cold=t<12,rainy=r>=3;
  if(hot){
    if(w.c==='white')s+=18;
    if(w.c==='sparkling')s+=16;
    if(w.c==='rose')s+=10;
    if(CITRUS.some(k=>f.includes(k)))s+=16;
    if(FRESH.some(k=>f.includes(k)))s+=8;
    s+=(w.ac-50)*0.35; s-=w.tn*0.18; s-=Math.max(0,w.bd-60)*0.4;
  } else if(warm){ if(CITRUS.some(k=>f.includes(k)))s+=8; if(w.c==='sparkling')s+=6; s+=(w.ac-50)*0.15; }
  if(rainy){ s+=(w.bd-55)*0.5; if(w.c==='red')s+=10; if(w.c==='sparkling')s-=6; }
  if(cold){ if(w.c==='red')s+=14; s+=(w.bd-55)*0.4; s+=w.tn*0.12; if(w.c==='sparkling')s-=8; }
  if(w.sw>45)s-=15; if(w.sw>65)s-=20;
  return s;
}
function seededRand(seed){let t=seed>>>0;return function(){t+=0x6D2B79F5;let x=Math.imul(t^(t>>>15),1|t);x^=x+Math.imul(x^(x>>>7),61|x);return((x^(x>>>14))>>>0)/4294967296;};}
function strSeed(s){let h=2166136261;for(const c of s){h^=c.charCodeAt(0);h=Math.imul(h,16777619);}return h>>>0;}
function pick(t,r,dateStr,recentIds,colorFilter,tierFilter){
  const tp=targetProfile(t,r);
  let pool=WINES.filter(w=>w.ok);
  if(tierFilter==='daily') pool=pool.filter(w=>(w.t==='1만'||w.t==='3만')&&w.c!=='dessert');
  else if(tierFilter&&tierFilter!=='all') pool=pool.filter(w=>w.t===tierFilter);
  if(colorFilter&&colorFilter!=='all')pool=pool.filter(w=>w.c===colorFilter);
  if(pool.length===0) return null;
  let avail=pool.filter(w=>!recentIds.has('w'+w.id));
  if(avail.length===0)avail=pool;
  const scored=avail.map(w=>({w,s:scoreWine(w,tp,t,r)})).sort((a,b)=>b.s-a.s);
  const top=scored.slice(0,Math.min(10,scored.length));
  const rnd=seededRand(strSeed(dateStr+'|'+t+'|'+r+'|'+(colorFilter||'all')+'|'+(tierFilter||'')));
  return {w:top[Math.floor(rnd()*top.length)].w,tp};
}

// ---------- storage ----------
const HKEY='jayang_wine_history_v2';
function loadHist(){try{return JSON.parse(localStorage.getItem(HKEY)||'[]');}catch(e){return[];}}
function saveHist(h){localStorage.setItem(HKEY,JSON.stringify(h));}
function recentIds(hist,days){
  const cut=Date.now()-days*86400000;
  const s=new Set();
  hist.forEach(e=>{ if(new Date(e.date+'T00:00:00').getTime()>=cut) s.add(e.id); });
  return s;
}

// ---------- helpers ----------
function wcEmoji(t,r){ if(r>=8)return'🌧️'; if(r>=1)return'🌦️'; if(t>=28)return'☀️'; if(t>=20)return'🌤️'; if(t<5)return'❄️'; return'⛅';}
function reasonText(w,t,r){
  const parts=[];
  if(t>=28) parts.push('무더운 날씨라 산미가 또렷하고 청량한 와인이 갈증을 씻어줘요');
  else if(t>=24) parts.push('더운 편이라 산뜻한 산미와 과실향이 살아있는 와인이 어울려요');
  else if(t>=18) parts.push('온화한 날씨엔 균형 잡힌 미디엄 스타일이 좋아요');
  else if(t>=12) parts.push('선선해서 살짝 무게감 있는 와인이 어울려요');
  else parts.push('쌀쌀한 날씨엔 바디감 있고 따뜻한 느낌의 와인이 제격이에요');
  if(r>=8) parts.push('비가 많이 와서 바디감이 묵직한 쪽으로 골랐어요');
  else if(r>=3) parts.push('비가 와서 조금 더 진한 스타일을 담았어요');
  const flav=(w.fl||'').split('·')[0].replace(/\s*\d+%/,'').trim();
  const styleWord={red:'레드',white:'화이트',sparkling:'스파클링',rose:'로제',dessert:'디저트 와인'}[w.c];
  return parts.join(', ')+`. 특히 ${flav||'과실'} 향의 ${styleWord}가 오늘 날씨와 잘 맞아요.`;
}
function bar(lb,v){return `<div class="bar"><span class="lb">${lb}</span><span class="track"><span class="fill" style="width:${Math.min(100,v)}%"></span></span><span class="vv">${v}</span></div>`;}
function colorBadge(w){return `<span class="badge b-${w.c}">${COL_LB[w.c]}</span>`;}
function cardHTML(w,t,r,withReason){
  const okb=w.ok?'':'<span class="badge b-out">결품 추정</span>';
  const secb=w.second?'<span class="badge b-sec">세컨드 픽</span>':'';
  return `<div class="badges">${colorBadge(w)}<span class="badge b-tier">${TIER_LB[w.t]}</span><span class="badge b-tier">${w.v}</span>${secb}${okb}</div>
   <div class="wname">${w.n}</div>
   <div class="wvar">${w.kn||''}${w.price?' · '+fmtP(w.price):''}</div>
   <div class="wregion">📍 ${w.r||''}${w.cep?' · 🍇 '+w.cep:''}</div>
   ${withReason?`<div class="reason">${reasonText(w,t,r)}</div>`:''}
   <div class="meta"><b>맛·향</b> ${w.fl||''}</div>
   <div class="pair"><b style="color:var(--wine)">마리아주</b> ${w.pr||''}</div>
   ${w.desc?`<div class="desc">${w.desc}</div>`:''}
   <div class="bars">${bar('당도',w.sw)}${bar('산도',w.ac)}${bar('타닌',w.tn)}${bar('바디',w.bd)}</div>
   <div class="meta" style="color:var(--muted);font-size:12px">알코올 약 ${w.ab}%</div>`;
}

// ---------- study schedule ----------
// 학습달/복습달 교대: 2026-07(7/10~)=학습달, 8월=7월 품종 1회씩 복습, 9월=새 품종, ...
function monthCal(mi){const m0=7+mi;return {y:2026+Math.floor((m0-1)/12), m:((m0-1)%12)+1};}
function dim(y,m){return new Date(y,m,0).getDate();}
function learnDays(mi){const c=monthCal(mi); return mi===0? dim(c.y,c.m)-9 : dim(c.y,c.m);}
function learnOffset(mi){let off=0;for(let k=0;k<mi;k+=2)off+=learnDays(k);return off;}
function studyFor(ds){
  const p=ds.split('-').map(Number); const y=p[0],m=p[1],d=p[2];
  const mi=(y-2026)*12+(m-7);
  if(mi<0||(mi===0&&d<10))return null;
  const N=STUDY.length;
  if(mi%2===0){
    const dayIdx=(mi===0)?d-10:d-1;
    return {mode:'learn',mi,v:STUDY[(learnOffset(mi)+dayIdx)%N],num:dayIdx+1,total:learnDays(mi)};
  }
  const off=learnOffset(mi-1),len=learnDays(mi-1);
  if(d<=len)return {mode:'review',mi,v:STUDY[(off+d-1)%N],num:d,total:len};
  return {mode:'bonus',mi,v:STUDY[(off+((d-1)%len))%N],num:len,total:len};
}
function monthSchedule(ds){
  const p=ds.split('-').map(Number); const y=p[0],m=p[1];
  const mi=(y-2026)*12+(m-7); const N=STUDY.length; const rows=[];
  if(mi%2===0){
    const off=learnOffset(mi), start=(mi===0)?10:1, total=dim(y,m);
    for(let d=start;d<=total;d++) rows.push({d,v:STUDY[(off+(d-start))%N]});
  } else {
    const off=learnOffset(mi-1), len=learnDays(mi-1), total=Math.min(len,dim(y,m));
    for(let d=1;d<=total;d++) rows.push({d,v:STUDY[(off+d-1)%N]});
  }
  return rows;
}
function linkedWines(s){
  if(s.vno) return WINES.filter(w=>w.vno===s.vno);
  const key=s.ko.split('(')[0].trim();
  return WINES.filter(w=>(w.cep&&w.cep.includes(key))||(w.v&&w.v.includes(key)));
}
function renderStudy(){
  const ds=todayStr();
  const st=studyFor(ds);
  const el=document.getElementById('studyCard');
  if(!st){el.innerHTML='<div class="previewline">품종 공부는 2026년 7월 10일부터 시작해요.</div>';return;}
  const s=st.v;
  const modeLb=st.mode==='learn'
    ?`<span class="mode mode-learn">새 품종 학습 · ${st.num}/${st.total}일</span>`
    :st.mode==='review'
    ?`<span class="mode" style="background:#e8eef7;color:#2e5a8a">복습 · 지난달 품종을 딱 한 번 더 (${st.num}/${st.total})</span>`
    :`<span class="mode" style="background:#f4ede4;color:#8a6a3a">이달 복습 완료 · 자유 복습</span>`;
  const lw=linkedWines(s);
  const lwHtml=lw.length
    ?`<div class="gwines"><div style="font-size:12px;font-weight:700;color:var(--wine);margin-bottom:2px">🛒 매대에서 만나기</div>`+
      lw.slice(0,6).map(w=>`<div class="gw">${COL_EMO[w.c]} <b>${w.n}</b> <span style="color:var(--muted)">${TIER_LB[w.t]} · ${fmtP(w.price)}${w.ok?'':' · 결품'}</span></div>`).join('')+
      (lw.length>6?`<div class="previewline">외 ${lw.length-6}병</div>`:'')+`</div>`
    :`<div class="previewline" style="margin-top:10px">이 품종은 지금 매대에 없어요 — 심화 학습용 품종입니다.</div>`;
  const sched=monthSchedule(ds);
  const p2=ds.split('-').map(Number);
  const schedHtml=`<details class="sched"><summary>이번 달 ${st.mode==='learn'?'학습':'복습'} 일정 보기 (${sched.length}일)</summary>`+
    sched.map(r=>`<div class="srow${r.d===p2[2]?' today':''}"><span class="sd">${p2[1]}/${r.d}</span><span>${COL_EMO[r.v.c]} ${r.v.ko} <span style="color:var(--muted)">(${r.v.en})</span></span></div>`).join('')+`</details>`;
  el.innerHTML=`${modeLb}
   <div class="gname">${COL_EMO[s.c]} ${s.ko}</div>
   <div class="gen">${s.en}</div>
   <div class="gline"><b>기원</b> ${s.o}</div>
   <div class="gline"><b>대표 산지</b> ${s.rg}</div>
   <div class="gline"><b>향</b> ${s.ar}</div>
   <div class="gline"><b>스타일</b> ${s.pf}</div>
   <div class="gline"><b>마리아주</b> ${s.fd}</div>
   <div class="gdesc">${s.d}</div>
   ${lwHtml}
   ${schedHtml}
   <div class="prog">품종 풀 ${STUDY.length}종 (매대 69 + 심화 88) · 학습달·복습달이 매달 교대해요</div>`;
}

// ---------- render ----------
const WX=EMBEDDED_WEATHER;
function todayStr(){
  const d=new Date(); const kst=new Date(d.getTime()+(9*60+d.getTimezoneOffset())*60000);
  return kst.getFullYear()+'-'+String(kst.getMonth()+1).padStart(2,'0')+'-'+String(kst.getDate()).padStart(2,'0');
}
function renderWeather(){
  const e=document.getElementById('weather');
  e.innerHTML=`<div class="emo">${wcEmoji(WX.tempMax,WX.rain)}</div>
    <div><div class="wx-main">오늘 자양동 · 최고 ${WX.tempMax}°C · 강수 ${WX.rain}mm</div>
    <div class="wx-sub">${WX.desc||''} · 업데이트 ${WX.updated||WX.date}</div></div>`;
}
function renderToday(){
  const hist=loadHist();
  const ds=todayStr();
  let entry=hist.find(e=>e.date===ds);
  let w;
  if(entry){ w=WINES.find(x=>'w'+x.id===entry.id); }
  if(!w){
    const rec=recentIds(hist,30);
    const res=pick(WX.tempMax,WX.rain,ds,rec,'all','daily');
    w=res.w;
    hist.unshift({date:ds,id:'w'+w.id,name:w.n,color:w.c});
    saveHist(hist.slice(0,120));
  }
  document.getElementById('todayCard').innerHTML=cardHTML(w,WX.tempMax,WX.rain,true);
  renderHist();
}
function renderHist(){
  const hist=loadHist();
  const box=document.getElementById('hist');
  if(hist.length===0){box.innerHTML='<div class="previewline">아직 기록이 없어요.</div>';return;}
  box.innerHTML=hist.slice(0,30).map(e=>`<div class="hrow"><span class="hd">${e.date.slice(5)}</span><span class="hn">${COL_EMO[e.color]||''} ${e.name}</span></div>`).join('');
}
function renderLab(){
  const t=+document.getElementById('tSlider').value;
  const r=+document.getElementById('rSlider').value;
  const cf=document.getElementById('colorFilter').value;
  const tf=document.getElementById('tierFilter').value;
  document.getElementById('tOut').textContent=t+'°C';
  document.getElementById('rOut').textContent=r+'mm';
  const tp=targetProfile(t,r);
  document.getElementById('labTarget').textContent=`목표 산도 ${Math.round(tp.tAcid)} · 목표 바디 ${Math.round(tp.tBody)}`;
  const rec=recentIds(loadHist(),30);
  const res=pick(t,r,'lab-'+todayStr(),rec,cf,tf);
  document.getElementById('labPick').innerHTML=res
    ?`👉 ${COL_EMO[res.w.c]} <b>${res.w.n}</b> · ${res.w.v} · ${TIER_LB[res.w.t]} ${fmtP(res.w.price)} <span style="color:var(--muted)">(산도 ${res.w.ac}·바디 ${res.w.bd})</span>`
    :'조건에 맞는 재고 와인이 없어요.';
}
// ---------- browser ----------
let openId=null;
function renderBrowser(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const c=document.getElementById('bColor').value;
  const t=document.getElementById('bTier').value;
  const okOnly=document.getElementById('bOk').checked;
  let list=WINES.filter(w=>
    (c==='all'||w.c===c)&&(t==='all'||w.t===t)&&(!okOnly||w.ok)&&
    (!q||(w.n+' '+(w.kn||'')+' '+(w.v||'')+' '+(w.r||'')+' '+(w.cep||'')).toLowerCase().includes(q)));
  const box=document.getElementById('bList');
  box.innerHTML=list.slice(0,250).map(w=>
    `<div class="wrow${w.ok?'':' dim'}" data-id="${w.id}"><div class="top">${COL_EMO[w.c]} <span class="nm">${w.n}</span>
     <span class="badge b-tier">${TIER_LB[w.t]}</span>${w.ok?'':'<span class="badge b-out">결품</span>'}
     <span class="pc">${w.v} · ${fmtP(w.price)}</span></div></div>`+
    (openId===w.id?`<div class="wdetail">${cardHTML(w,WX.tempMax,WX.rain,false)}</div>`:'')
  ).join('');
  document.getElementById('bCount').textContent=`${list.length}병 표시 중 · 전체 ${WINES.length}병(재고 ${WINES.filter(w=>w.ok).length})`;
}
document.getElementById('bList').addEventListener('click',e=>{
  const row=e.target.closest('.wrow'); if(!row)return;
  const id=+row.dataset.id; openId=(openId===id)?null:id; renderBrowser();
});
['q','bColor','bTier','bOk'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener(el.tagName==='INPUT'&&el.type==='text'?'input':'change',()=>{openId=null;renderBrowser();});
});

['tSlider','rSlider'].forEach(id=>document.getElementById(id).addEventListener('input',renderLab));
document.getElementById('colorFilter').addEventListener('change',renderLab);
document.getElementById('tierFilter').addEventListener('change',renderLab);
document.getElementById('resetBtn').addEventListener('click',()=>{ if(confirm('추천 기록을 모두 지울까요? (중복 방지 기록도 초기화됩니다)')){localStorage.removeItem(HKEY);renderToday();} });

document.getElementById('foot').innerHTML=`추천 풀: 이마트 대전복합터미널점 전체 매대 ${WINES.length}병 판독(2026.07) · 데일리 추천은 1~3만원대 재고 ${WINES.filter(w=>w.ok&&(w.t==='1만'||w.t==='3만')&&w.c!=='dessert').length}병에서, 최근 30일 중복 제외<br>알고리즘: 기온↑ → 산미·시트러스·화이트·스파클링 가중 / 강수·저온 → 바디·타닌·레드 가중<br>품종 공부: ${STUDY.length}종을 학습달(매일 새 품종)→복습달(전달 품종 하루 1개씩 딱 1회)→새 품종 순서로 순환 · 날씨는 매일 아침 예약 작업이 갱신합니다.`;

document.getElementById('tSlider').value=WX.tempMax;
document.getElementById('rSlider').value=WX.rain;
renderWeather();
renderToday();
renderStudy();
renderLab();
renderBrowser();
</script>
